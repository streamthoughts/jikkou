# Jikkou configuration for the Apache Iceberg demo
# Configures two provider instances:
#   - iceberg-jdbc   (default) — PostgreSQL JDBC catalog
#   - iceberg-nessie           — Nessie REST catalog
#
# Usage (JDBC — default provider, no flag needed):
#   jikkou apply --files ./resources/01-namespaces.yaml
#
# Usage (Nessie — explicit --provider flag):
#   jikkou apply --provider iceberg-nessie --files ./resources/01-namespaces.yaml

jikkou {

  # ── PostgreSQL JDBC catalog (default) ──────────────────────────────────
  provider.iceberg-jdbc {
    enabled = true
    default = true
    type = io.jikkou.iceberg.IcebergExtensionProvider
    config = {
      catalogType = "jdbc"
      catalogName = "demo"
      catalogUri  = "jdbc:postgresql://localhost:5432/iceberg"

      # Iceberg metadata JSON files are written here by Jikkou
      warehouse = "/tmp/iceberg-demo"

      catalogProperties {
        jdbc.user            = "iceberg"
        jdbc.password        = "iceberg"
        jdbc.schema-version  = "V1"
      }
    }
  }

  # ── Nessie REST catalog ────────────────────────────────────────────────
  provider.iceberg-nessie {
    enabled = true
    type = io.jikkou.iceberg.IcebergExtensionProvider
    config = {
      # Nessie exposes a standard Iceberg REST catalog at /iceberg
      catalogType = "rest"
      catalogName = "nessie"
      catalogUri  = "http://localhost:19120/iceberg"

      # Must match NESSIE_CATALOG_DEFAULT_WAREHOUSE in docker-compose
      warehouse = "warehouse"

      catalogProperties {
        # Nessie branch to work on
        prefix = "main"
      }
    }
  }
}
