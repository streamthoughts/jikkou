---
# Step 4 — Safe column rename via previousName
# Setting previousName instructs Jikkou to rename the column instead of
# dropping and re-adding it. Iceberg preserves the internal field ID,
# so existing Parquet files are still readable under the new name.
apiVersion: "iceberg.jikkou.io/v1beta1"
kind: "IcebergTable"
metadata:
  name: "analytics.events.page_views"
spec:
  schema:
    columns:
      - name: "event_id"
        type: "uuid"
        required: true
        doc: "Unique event identifier"
      - name: "user_id"
        type: "long"
        required: true
        doc: "User who triggered the event"
      # "page_url" renamed to "url" — previousName triggers a safe rename
      - name: "url"
        previousName: "page_url"
        type: "string"
        required: true
        doc: "URL of the viewed page"
      - name: "event_time"
        type: "timestamptz"
        required: true
        doc: "Event timestamp (UTC)"
      - name: "duration_ms"
        type: "long"
        doc: "Time the user spent on the page (milliseconds)"
      - name: "referrer"
        type: "string"
        doc: "HTTP Referer header value"
  partitionFields:
    - sourceColumn: "event_time"
      transform: "day"
  sortFields:
    - column: "event_time"
      direction: "asc"
      nullOrder: "last"
  properties:
    write.format.default: "parquet"
    write.parquet.compression-codec: "zstd"
